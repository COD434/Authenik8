services:
   rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports: 
    - "5672:5672"
    - "15672:15672"
   email-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://rabbitmq
    restart: always


   grafana:
        image: grafana/grafana
        container_name: grafana
        ports:
          - "3001:3000"

   prometheus:
      image: prom/prometheus
      container_name: prometheus
      volumes:
        - ./prometheus.yml:/home/seeisa/Prometheus/prometheus.yml
      ports:
        - "9090:9090"
   api:
    build: .
    container_name: api
    ports:
      - "5000:5000"
      - "5555:5555"
    env_file:
    - .env.test
    depends_on:
    - redis
    - db

    command: >
      sh -c "
        until nc -z db 5432; do
         echo 'Waiting for db to be ready...'
         sleep 1 
        done &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run build &&
        npm run start
        "

    environment:
      - DATABASE_URL=postgresql://seeisa:karabo@db:5432/top_user_test
      - RABBITMQ_URL=amqp://rabbitmq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

   redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"


   db:
    image: postgres:16-alpine
    container_name: authenik8-postgres-test
    environment:
       POSTGRES_USER: seeisa
       POSTGRES_PASSWORD: karabo
       POSTGRES_DB: top_user_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seeisa -d top_user_test"]
      interval: 2s
      timeout: 5s
      retries: 15

  
